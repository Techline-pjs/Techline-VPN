name: Build Techline APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x V2rayNG/gradlew

    - name: Build Debug APK
      working-directory: V2rayNG
      run: ./gradlew assembleDebug

    - name: Build Release APK
      working-directory: V2rayNG
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Techline-debug.apk
        path: V2rayNG/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Techline-release.apk
        path: V2rayNG/app/build/outputs/apk/release/*.apk
        retention-days: 30
